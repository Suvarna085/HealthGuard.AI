<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthGuard — Patient Registration</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14; --surface: #111820; --border: #1e2a38;
    --text: #c9d1d9; --muted: #4a5568; --accent: #00d4ff;
    --green: #00ff88; --red: #ff3333; --yellow: #ffd60a;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

  .container { width: 100%; max-width: 560px; }

  /* Header */
  .header { text-align: center; margin-bottom: 32px; }
  .header-icon { font-size: 48px; margin-bottom: 16px; display: block; }
  .header h1 { font-family: var(--font-mono); font-size: 22px; color: var(--accent); margin-bottom: 8px; }
  .header p { font-size: 14px; color: var(--muted); }

  /* Form card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin-bottom: 24px; }
  .card h2 { font-family: var(--font-mono); font-size: 13px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 24px; }

  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 12px; color: var(--muted); font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }

  .field input, .field select {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 15px;
    font-family: var(--font-sans); transition: border-color 0.2s;
    appearance: none;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .submit-btn {
    width: 100%; padding: 14px; background: var(--accent); color: #0a0e14;
    font-size: 15px; font-weight: 600; font-family: var(--font-sans);
    border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s;
  }
  .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Success state */
  .success-card {
    display: none; background: rgba(0, 255, 136, 0.05);
    border: 1px solid rgba(0, 255, 136, 0.2);
    border-radius: 16px; padding: 32px; text-align: center; margin-bottom: 24px;
  }
  .success-card.show { display: block; }
  .success-icon { font-size: 48px; margin-bottom: 16px; display: block; }
  .success-id { font-family: var(--font-mono); font-size: 28px; font-weight: 600; color: var(--green); margin-bottom: 8px; }
  .success-name { font-size: 18px; color: var(--text); margin-bottom: 6px; }
  .success-meta { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .register-another { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 10px 24px; border-radius: 8px; cursor: pointer; font-family: var(--font-sans); font-size: 14px; transition: all 0.2s; }
  .register-another:hover { border-color: var(--accent); color: var(--accent); }

  /* Active patients list */
  .patients-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .patients-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .patients-title { font-family: var(--font-mono); font-size: 12px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; }
  .patient-count { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

  .patient-row {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    animation: slide-in 0.3s ease-out;
  }
  @keyframes slide-in { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
  .patient-row:last-child { border-bottom: none; }

  .patient-row-info { display: flex; align-items: center; gap: 12px; }
  .patient-badge { font-family: var(--font-mono); font-size: 11px; color: var(--accent); background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.2); border-radius: 4px; padding: 2px 8px; }
  .patient-row-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .patient-row-meta { font-size: 12px; color: var(--muted); }

  .remove-btn { background: transparent; border: 1px solid rgba(255,51,51,0.3); color: var(--red); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: var(--font-mono); transition: all 0.2s; }
  .remove-btn:hover { background: rgba(255,51,51,0.1); }

  .empty-patients { padding: 32px; text-align: center; color: var(--muted); font-family: var(--font-mono); font-size: 12px; }

  .error-msg { color: var(--red); font-size: 13px; margin-top: 12px; font-family: var(--font-mono); display: none; }
  .error-msg.show { display: block; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="header-icon">🏥</span>
    <h1>HealthGuard Registration</h1>
    <p>Register a patient to begin real-time monitoring</p>
  </div>

  <!-- Registration Form -->
  <div class="card" id="formCard">
    <h2>New Patient</h2>

    <div class="field-row">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="e.g. Alice Johnson">
      </div>
      <div class="field">
        <label>Age</label>
        <input type="number" id="age" placeholder="e.g. 67" min="1" max="120">
      </div>
    </div>

    <div class="field">
      <label>Medical Condition</label>
      <select id="condition">
        <option value="">— Select condition —</option>
        <option>Diabetic</option>
        <option>Type 1 Diabetic</option>
        <option>Hypertensive</option>
        <option>Asthmatic</option>
        <option>COPD</option>
        <option>Chronic Heart Failure</option>
        <option>Atrial Fibrillation</option>
        <option>Kidney Disease</option>
        <option>Post-Stroke</option>
        <option>Epileptic</option>
        <option>General Monitoring</option>
      </select>
    </div>

    <div class="field">
      <label>Ward / Room Number</label>
      <input type="text" id="ward" placeholder="e.g. Ward 3B / Room 12">
    </div>

    <button class="submit-btn" id="submitBtn" onclick="registerPatient()">Register Patient</button>
    <div class="error-msg" id="errorMsg">Please fill in all required fields.</div>
  </div>

  <!-- Success Message -->
  <div class="success-card" id="successCard">
    <span class="success-icon">✅</span>
    <div class="success-id" id="successId">--</div>
    <div class="success-name" id="successName">--</div>
    <div class="success-meta" id="successMeta">--</div>
    <p style="font-size:13px; color:var(--muted); margin-bottom:20px;">
      Monitoring will begin within 5 seconds. The caregiver dashboard will update automatically.
    </p>
    <button class="register-another" onclick="resetForm()">Register Another Patient</button>
  </div>

  <!-- Active Patients -->
  <div class="patients-card">
    <div class="patients-header">
      <div class="patients-title">⚡ Active Patients</div>
      <div class="patient-count" id="patientCount">Loading...</div>
    </div>
    <div id="patientsList">
      <div class="empty-patients">No patients registered yet.</div>
    </div>
  </div>

</div>

<script>
async function registerPatient() {
  const name      = document.getElementById("name").value.trim();
  const age       = document.getElementById("age").value;
  const condition = document.getElementById("condition").value;
  const ward      = document.getElementById("ward").value.trim();

  if (!name || !age || !condition) {
    document.getElementById("errorMsg").classList.add("show");
    return;
  }
  document.getElementById("errorMsg").classList.remove("show");
  document.getElementById("submitBtn").disabled = true;
  document.getElementById("submitBtn").textContent = "Registering...";

  try {
    const res = await fetch("http://localhost:8000/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, age: parseInt(age), condition, ward }),
    });
    const data = await res.json();

    document.getElementById("successId").textContent   = data.patient_id;
    document.getElementById("successName").textContent = data.patient.name;
    document.getElementById("successMeta").textContent = `Age ${data.patient.age} · ${data.patient.condition} · ${data.patient.ward || "No ward"}`;

    document.getElementById("formCard").style.display    = "none";
    document.getElementById("successCard").classList.add("show");

    loadPatients();
  } catch (e) {
    document.getElementById("errorMsg").textContent = "Could not connect to server. Is the backend running?";
    document.getElementById("errorMsg").classList.add("show");
  }

  document.getElementById("submitBtn").disabled = false;
  document.getElementById("submitBtn").textContent = "Register Patient";
}

function resetForm() {
  document.getElementById("name").value      = "";
  document.getElementById("age").value       = "";
  document.getElementById("condition").value = "";
  document.getElementById("ward").value      = "";
  document.getElementById("formCard").style.display = "block";
  document.getElementById("successCard").classList.remove("show");
}

async function removePatient(id, name) {
  if (!confirm(`Remove ${name} from monitoring?`)) return;
  await fetch(`http://localhost:8000/patients/${id}`, { method: "DELETE" });
  loadPatients();
}

async function loadPatients() {
  try {
    const res = await fetch("http://localhost:8000/patients");
    const patients = await res.json();

    document.getElementById("patientCount").textContent = `${patients.length} registered`;

    const list = document.getElementById("patientsList");
    if (patients.length === 0) {
      list.innerHTML = '<div class="empty-patients">No patients registered yet.</div>';
      return;
    }

    list.innerHTML = patients.map(p => `
      <div class="patient-row">
        <div class="patient-row-info">
          <span class="patient-badge">${p.id}</span>
          <div>
            <div class="patient-row-name">${p.name}</div>
            <div class="patient-row-meta">Age ${p.age} · ${p.condition}${p.ward ? ' · ' + p.ward : ''}</div>
          </div>
        </div>
        <button class="remove-btn" onclick="removePatient('${p.id}', '${p.name}')">Remove</button>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById("patientCount").textContent = "Server offline";
  }
}

// Load on start, refresh every 10s
loadPatients();
setInterval(loadPatients, 10000);
</script>
</body>
</html>
